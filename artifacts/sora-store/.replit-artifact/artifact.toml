kind = "web"
previewPath = "/"
title = "Sora Store"
version = "1.0.0"
id = "artifacts/sora-store"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21202

[services.development]
run = "pnpm --filter @workspace/sora-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sora-store", "run", "build" ]
serve = "static"
publicDir = "artifacts/sora-store/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21202"
BASE_PATH = "/"
